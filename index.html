<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Dashboard</title>
    <style>
        /* Base Page Styles */
        body {
            background-color: #1a0f12; /* Dark cherry night sky */
            color: #ffd1dc; /* Soft pastel pink */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Ambient Background Pink Glow */
        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 183, 197, 0.15) 0%, rgba(0,0,0,0) 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }

        /* The Main Terminal Frame */
        .terminal-container {
            width: 90%;
            max-width: 1000px;
            border: 2px solid #ffb7c5; /* Sakura Pink Border */
            border-radius: 8px;
            background-color: #261418; /* Dark cherry background */
            padding: 25px;
            box-shadow: 0 0 20px rgba(255, 183, 197, 0.4);
            z-index: 10;
        }

        /* Header style */
        .terminal-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #ffb7c5;
            padding-bottom: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            color: #ffffff; 
            text-shadow: 0 0 5px #ffb7c5;
        }

        /* Grid Layouts for Panels */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .widgets-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Standard Panels (Boxes) */
        .box {
            border: 1px solid #ffb7c5;
            border-radius: 4px;
            padding: 15px;
            background: rgba(255, 183, 197, 0.03);
            box-shadow: inset 0 0 10px rgba(255, 183, 197, 0.1);
        }

        ul {
            list-style-type: none;
            padding-left: 5px;
        }

        li {
            margin-bottom: 8px;
        }

        /* Text and Button Glows */
        h3 {
            margin-top: 0;
            color: #ffffff;
            text-shadow: 0 0 8px #ffb7c5;
        }

        .btn {
            display: block;
            text-align: center;
            border: 1px solid #ffb7c5;
            padding: 8px;
            margin: 10px 0;
            color: #ffb7c5;
            text-decoration: none;
            transition: all 0.3s ease;
            background: none;
            border-radius: 4px;
        }

        .btn:hover {
            background-color: #ffb7c5;
            color: #261418;
            box-shadow: 0 0 15px #ffb7c5;
            cursor: pointer;
        }

        /* Clock styling */
        .time {
            font-size: 2.5rem;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 0 10px #ffb7c5;
        }
        .label {
            font-size: 0.8rem;
            text-align: center;
            color: #ffb7c5;
            opacity: 0.8;
        }

        /* Sakura Floating Petals Setup */
        #sakura-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .petal {
            position: absolute;
            background-color: #ffb7c5;
            border-radius: 150% 0 150% 150%; 
            opacity: 0.8;
            animation: fall linear infinite;
            box-shadow: 0 0 8px rgba(255, 183, 197, 0.6);
        }

        @keyframes fall {
            0% {
                top: -10%;
                transform: translateX(0) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                top: 110%;
                transform: translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div id="sakura-container"></div>

    <div class="terminal-container">
        
        <div class="terminal-header">
            <span>JLEE4069@OS</span>
            <span>/SOCIALS/</span>
        </div>

        <div class="main-grid">
            
            <div class="box sidebar">
                <h3>ROOT /socials/</h3>
                <ul>
                    <li>🌸 tiktok.link</li>
                    <li>🌸 youtube.cfg</li>
                    <li>🌸 instagram.ini</li>
                </ul>
            </div>

            <div class="box bash-prompt">
                <p>[system@sakura]</p>
                <p class="command">$ ./init_explorer.sh</p>
                <p class="response">> Filesystem Linked. System online.</p>
            </div>
            
        </div>

        <div class="widgets-grid">
            <div class="box clock-box">
                <div class="time" id="live-clock">00:00:00</div>
                <div class="label">REAL-TIME CLOCK</div>
            </div>

            <div class="box links-box">
                <h3>QUICK_LINKS</h3>
                <a href="https://github.com" class="btn" target="_blank">GITHUB</a>
                <a href="https://youtube.com" class="btn" target="_blank">YOUTUBE</a>
            </div>
        </div>

    </div>

    <script>
        // Real-time Clock
        function updateClock() {
            const now = new Date();
            const timeString = now.toTimeString().split(' ')[0];
            document.getElementById('live-clock').textContent = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Floating Sakura Petals
        function createPetal() {
            const container = document.getElementById('sakura-container');
            if(!container) return;
            const petal = document.createElement('div');
            
            const size = Math.random() * 8 + 6; 
            const startX = Math.random() * window.innerWidth;
            const duration = Math.random() * 5 + 5; 
            const delay = Math.random() * 5;

            petal.classList.add('petal');
            petal.style.width = `${size}px`;
            petal.style.height = `${size * 1.5}px`; 
            petal.style.left = `${startX}px`;
            petal.style.animationDuration = `${duration}s`;
            petal.style.animationDelay = `${delay}s`;

            container.appendChild(petal);

            setTimeout(() => {
                petal.remove();
            }, (duration + delay) * 1000);
        }
        setInterval(createPetal, 300);
    </script>
</body>
</html>
