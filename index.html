<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Dashboard</title>
    <style>
        /* Base Page Styles with Immersive Background Pattern */
        body {
            background-color: #12070a; 
            /* Subtle diagonal tech lines overlaid onto a dark cherry glow */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 183, 197, 0.12) 0%, rgba(10, 3, 5, 0.95) 80%),
                linear-gradient(45deg, rgba(255, 183, 197, 0.02) 25%, transparent 25%, transparent 75%, rgba(255, 183, 197, 0.02) 75%),
                linear-gradient(45deg, rgba(255, 183, 197, 0.02) 25%, transparent 25%, transparent 75%, rgba(255, 183, 197, 0.02) 75%);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            background-position: 0 0, 0 0, 20px 20px;
            color: #ffd1dc; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Ambient Global Neon Screen Overlay */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999;
            background-size: 100% 3px, 6px 100%;
            pointer-events: none;
        }

        /* The Main Terminal Frame */
        .terminal-container {
            width: 90%;
            max-width: 1000px;
            border: 2px solid #ffb7c5; 
            border-radius: 12px;
            background-color: rgba(38, 20, 24, 0.85); 
            backdrop-filter: blur(8px);
            padding: 25px;
            box-shadow: 0 0 30px rgba(255, 183, 197, 0.35), inset 0 0 15px rgba(255, 183, 197, 0.1);
            z-index: 10;
        }

        /* Header style */
        .terminal-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #ffb7c5;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #ffffff; 
            text-shadow: 0 0 8px #ffb7c5;
        }

        /* Grid Layouts for Panels */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .widgets-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Standard Panels (Boxes) */
        .box {
            border: 1px solid #ffb7c5;
            border-radius: 6px;
            padding: 15px;
            background: rgba(255, 183, 197, 0.02);
            box-shadow: inset 0 0 15px rgba(255, 183, 197, 0.08);
            display: flex;
            flex-direction: column;
        }

        /* Sidebar Image Styling */
        .sidebar-img {
            width: 100%;
            height: 100%;
            min-height: 180px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid rgba(255, 183, 197, 0.3);
        }

        /* Text and Button Glows */
        h3 {
            margin-top: 0;
            color: #ffffff;
            text-shadow: 0 0 8px #ffb7c5;
        }

        .btn {
            display: block;
            text-align: center;
            border: 1px solid #ffb7c5;
            padding: 10px;
            margin: 8px 0;
            color: #ffb7c5;
            text-decoration: none;
            transition: all 0.3s ease;
            background: rgba(255, 183, 197, 0.02);
            border-radius: 4px;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #ffb7c5;
            color: #261418;
            box-shadow: 0 0 15px #ffb7c5;
            cursor: pointer;
        }

        /* Clock styling */
        .time {
            font-size: 2.8rem;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 0 12px #ffb7c5;
            margin-top: auto;
            margin-bottom: auto;
        }
        .label {
            font-size: 0.8rem;
            text-align: center;
            color: #ffb7c5;
            opacity: 0.8;
            letter-spacing: 2px;
        }

        /* Sakura Floating Petals Container */
        #sakura-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        /* BIGGER Petals with Specular Highlights/Reflections */
        .petal {
            position: absolute;
            background: linear-gradient(135deg, #ffccd5 0%, #ffb7c5 60%, #e899a8 100%);
            border-radius: 150% 10% 150% 150%; 
            opacity: 0.85;
            animation: fall linear infinite;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15), 0 0 10px rgba(255, 183, 197, 0.4);
        }

        /* White glossy light reflection curve inside the leaf */
        .petal::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 15%;
            width: 50%;
            height: 30%;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            transform: rotate(-30deg);
            filter: blur(0.5px);
        }

        @keyframes fall {
            0% {
                top: -15%;
                transform: translateX(0) rotate3d(1, 1, 1, 0deg);
                opacity: 0.9;
            }
            50% {
                transform: translateX(60px) rotate3d(1, 2, 1, 180deg);
                opacity: 0.85;
            }
            100% {
                top: 115%;
                transform: translateX(120px) rotate3d(1, 1, 2, 360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div id="sakura-container"></div>

    <div class="terminal-container">
        
        <div class="terminal-header">
            <span>JLEE4069@OS</span>
            <span>/SOCIALS/</span>
        </div>

        <div class="main-grid">
            
            <div class="box sidebar">
                <img src="profile.png" alt="Profile Display" class="sidebar-img">
            </div>

            <div class="box bash-prompt">
                <p>[system@sakura]</p>
                <p class="command">$ ./init_explorer.sh</p>
                <p class="response">> Filesystem Linked. System online.</p>
            </div>
            
        </div>

        <div class="widgets-grid">
            <div class="box clock-box">
                <div class="time" id="live-clock">00:00:00</div>
                <div class="label">REAL-TIME CLOCK</div>
            </div>

            <div class="box links-box">
                <h3>QUICK_LINKS</h3>
                <a href="https://github.com" class="btn" target="_blank">GITHUB</a>
                <a href="https://youtube.com" class="btn" target="_blank">YOUTUBE</a>
            </div>
        </div>

    </div>

    <script>
        // Real-time Clock
        function updateClock() {
            const now = new Date();
            const timeString = now.toTimeString().split(' ')[0];
            document.getElementById('live-clock').textContent = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Bigger Floating Sakura Petals with randomized sizes
        function createPetal() {
            const container = document.getElementById('sakura-container');
            if(!container) return;
            const petal = document.createElement('div');
            
            // Scaled up size dimensions (approx 20px - 35px)
            const size = Math.random() * 15 + 20; 
            const startX = Math.random() * window.innerWidth;
            const duration = Math.random() * 6 + 6; 
            const delay = Math.random() * 4;

            petal.classList.add('petal');
            petal.style.width = `${size}px`;
            petal.style.height = `${size * 1.4}px`; 
            petal.style.left = `${startX}px`;
            petal.style.animationDuration = `${duration}s`;
            petal.style.animationDelay = `${delay}s`;

            container.appendChild(petal);

            setTimeout(() => {
                petal.remove();
            }, (duration + delay) * 1000);
        }
        setInterval(createPetal, 400);
    </script>
</body>
</html>
