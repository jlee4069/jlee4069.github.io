<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Retro Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="terminal-container">
        
        <div class="terminal-header">
            <span>ESPDEFEATOR@OS</span>
            <span>/SOCIALS/</span>
        </div>

        <div class="main-grid">
            
            <div class="box sidebar">
                <h3>ROOT /socials/</h3>
                <ul>
                    <li>📄 tiktok.link</li>
                    <li>📄 youtube.cfg</li>
                    <li>📄 instagram.ini</li>
                </ul>
            </div>

            <div class="box bash-prompt">
                <p>[system@matrix]</p>
                <p class="command">$ ./init_explorer.sh</p>
                <p class="response">> Filesystem Linked. Click to execute.</p>
            </div>
            
        </div>

        <div class="widgets-grid">
            <div class="box clock-box">
                <div class="time">11:28:53</div>
                <div class="label">REAL-TIME CLOCK</div>
            </div>

            <div class="box links-box">
                <h3>QUICK_LINKS</h3>
                <a href="#" class="btn">GITHUB</a>
                <a href="#" class="btn">YOUTUBE</a>
            </div>
        </div>

    </div>

</body>
</html>
